<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>Skills Store</title>
<style>
:root{
  --bg:#f5f6f8; --card:#fff; --line:#e2e5ea; --fg:#1e2430; --dim:#697180;
  --acc:#2563eb; --ok:#15803d; --warn:#b45309; --err:#dc2626; --purple:#7c3aed;
}
*{box-sizing:border-box}
body{margin:0;font:14px/1.55 -apple-system,"PingFang SC","Helvetica Neue",sans-serif;
     background:var(--bg);color:var(--fg)}
button{font:inherit;padding:4px 10px;border:1px solid var(--line);border-radius:6px;
       background:var(--card);color:var(--fg);cursor:pointer}
button:hover{border-color:var(--acc);color:var(--acc)}
button.primary{background:var(--acc);border-color:var(--acc);color:#fff}
button.primary:hover{opacity:.9;color:#fff}
button.danger:hover{border-color:var(--err);color:var(--err)}
button:disabled{opacity:.45;cursor:default;pointer-events:none}
body.busy button{pointer-events:none;opacity:.45}
body.busy button.safe{pointer-events:auto;opacity:1}
input,select{font:inherit;padding:4px 8px;border:1px solid var(--line);border-radius:6px;
             background:var(--card);color:var(--fg)}
input:focus,select:focus{outline:none;border-color:var(--acc)}
pre{margin:0;font:12px/1.5 ui-monospace,Menlo,monospace;white-space:pre-wrap;word-break:break-all}

header{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
       padding:10px 16px;background:var(--card);border-bottom:1px solid var(--line)}
header h1{font-size:16px;margin:0 6px 0 0}
.spacer{flex:1}
#banner{display:none;padding:8px 16px;background:#fef2f2;color:var(--err);
        border-bottom:1px solid #fecaca}

.badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:12px;white-space:nowrap}
.b-ok{background:#dcfce7;color:var(--ok)} .b-err{background:#fee2e2;color:var(--err)}
.b-warn{background:#fef3c7;color:var(--warn)}
.b-npx{background:#dbeafe;color:var(--acc)} .b-authored{background:#dcfce7;color:var(--ok)}
.b-external{background:#ede9fe;color:var(--purple)} .b-orphan{background:#fee2e2;color:var(--err)}
.clickable{cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px}

#healthOut{display:none;padding:10px 16px;background:#0f172a;color:#d1d9e6;
           border-bottom:1px solid var(--line);max-height:220px;overflow:auto}

main{display:grid;grid-template-columns:minmax(0,3fr) minmax(0,2fr);gap:16px;
     padding:16px;align-items:start}
/* the right column sticks to the viewport (69px = sticky header 53px + main
   padding 16px) so the activity log stays visible while the skills list scrolls */
#sideCol{position:sticky;top:69px;display:flex;flex-direction:column;gap:16px;
         max-height:calc(100vh - 85px)}
#projectsPane{flex:0 1 auto;min-height:0;display:flex;flex-direction:column}
#projectCards{overflow:auto;min-height:0}
#logPane{flex:1 1 160px;min-height:160px;display:flex;flex-direction:column}
@media (max-width:980px){main{grid-template-columns:1fr}
  #sideCol{position:static;max-height:none}}
.pane{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px}
.pane h2{font-size:14px;margin:0 0 10px}
.panehead{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.panehead h2{flex:1;margin:0}

.filters{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.filters input[type=search]{flex:1;min-width:140px}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:top}
th{font-size:12px;color:var(--dim);font-weight:600;white-space:nowrap}
td.name{font-weight:600;cursor:pointer;white-space:nowrap}
td.name:hover{color:var(--acc)}
tr.grouphead td{background:#f4f6fa}
td.glabel{cursor:pointer;user-select:none}
td.glabel:hover{color:var(--acc)}
td.glabel:focus-visible{outline:2px solid var(--acc);outline-offset:-2px}
.gcaret{display:inline-block;width:14px;font-size:11px;color:var(--dim)}
.gcount{font-size:12px;color:var(--dim);margin-left:6px;font-weight:400}
.desc{font-size:12px;color:var(--dim);font-weight:400;max-width:480px;overflow:hidden;
      text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.mini{font-size:12px;padding:1px 7px;margin-left:4px}
.dimline{margin-top:8px;font-size:12px;color:var(--dim)}

#linkBar{display:none;position:sticky;bottom:0;margin-top:10px;padding:10px;gap:8px;
         align-items:center;flex-wrap:wrap;background:#eef4ff;border:1px solid #bfdbfe;
         border-radius:8px}
#linkBar.on{display:flex}
#newPath{display:none;min-width:260px}

.card{border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:10px}
.cardhead{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
summary.cardhead{cursor:pointer;list-style:none}
summary.cardhead::-webkit-details-marker{display:none}
summary.cardhead::before{content:'▸';flex:none;font-size:11px;color:var(--dim)}
details[open]>summary.cardhead::before{content:'▾'}
.lcount{font-size:12px;color:var(--dim);white-space:nowrap}
.pname{font-weight:600}
.ppath{font-size:12px;color:var(--dim);word-break:break-all}
.plinks{list-style:none;margin:8px 0 0;padding:0}
.plinks li{display:flex;align-items:center;gap:6px;padding:3px 0;
           border-bottom:1px dashed var(--line)}
.plinks li:last-child{border-bottom:none}
.plinks .lname{flex:1;word-break:break-all}
.cardfoot{display:flex;gap:8px;margin-top:8px}
.rowform{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.rowform input{flex:1;min-width:200px}

#log{flex:1;overflow:auto;min-height:0}
#log:empty::after{content:attr(data-empty);color:var(--dim);font-size:12px}
.logentry{border:1px solid var(--line);border-radius:8px;margin-bottom:6px;background:var(--card)}
.loghead{display:flex;gap:10px;align-items:center;padding:6px 10px;cursor:pointer;flex-wrap:wrap}
.logcmd{font:12px ui-monospace,Menlo,monospace;color:var(--dim);word-break:break-all;flex:1}
.logbody{display:none;padding:8px 10px;border-top:1px solid var(--line);background:#0f172a;
         color:#d1d9e6;border-radius:0 0 8px 8px;max-height:300px;overflow:auto}

dialog{border:1px solid var(--line);border-radius:10px;padding:16px;max-width:640px;width:90%}
dialog::backdrop{background:rgba(15,23,42,.35)}
dialog h3{margin:0 0 10px;font-size:15px}
dialog menu{display:flex;justify-content:flex-end;gap:8px;margin:14px 0 0;padding:0}
#modalPre{max-height:320px;overflow:auto;background:#0f172a;color:#d1d9e6;
          padding:10px;border-radius:8px}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.field label{font-size:12px;color:var(--dim)}
#drawer{position:fixed;inset:0 0 0 auto;height:100vh;max-height:100vh;width:min(560px,92vw);
        max-width:none;margin:0;border-radius:0;border-width:0 0 0 1px;overflow:auto}
#drawerMd{background:#f8fafc;border:1px solid var(--line);border-radius:8px;
          padding:10px;margin-top:10px;max-height:50vh;overflow:auto}
.kv{display:grid;grid-template-columns:auto 1fr;gap:2px 12px;font-size:13px;margin:8px 0}
.kv b{color:var(--dim);font-weight:500;white-space:nowrap}
.kv span{word-break:break-all}
</style>
</head>
<body>

<div id="banner"></div>

<header>
  <h1>Skills Store</h1>
  <span id="doctorBadge" class="badge clickable" data-action="health-toggle">doctor: …</span>
  <span id="pkgBadge" class="badge">PACKAGES.md: …</span>
  <span class="spacer"></span>
  <button data-action="doctor" data-i18n="btnDoctor"></button>
  <button data-action="gen" id="btnGen">Gen PACKAGES</button>
  <button data-action="sync">Sync External ⟳</button>
  <button data-action="refresh" data-i18n="btnRefresh"></button>
  <button class="safe" id="langBtn" data-action="lang-toggle"></button>
</header>
<pre id="healthOut"></pre>

<main>
  <section class="pane" id="skillsPane">
    <div class="panehead">
      <h2 data-i18n="skillsTitle"></h2>
      <button class="mini" data-action="ext-open" data-i18n="addExternal"></button>
    </div>
    <div class="filters">
      <input type="search" id="q" data-i18n-ph="filterPh">
      <select id="srcFilter">
        <option value="" data-i18n="srcAll"></option>
        <option value="npx">npx</option>
        <option value="authored">authored</option>
        <option value="external">external</option>
        <option value="orphan">orphan</option>
      </select>
      <select id="pkgFilter"><option value="" data-i18n="pkgAll"></option></select>
    </div>
    <table>
      <thead><tr>
        <th><input type="checkbox" id="selAll"></th>
        <th data-i18n="thName"></th><th data-i18n="thSource"></th><th data-i18n="thLinked"></th>
      </tr></thead>
      <tbody id="skillsBody"></tbody>
    </table>
    <div class="dimline" id="nonSkillLine"></div>
    <div id="linkBar">
      <span id="selLabel"></span>
      <select id="linkTarget"></select>
      <input id="newPath" list="pathOpts" data-i18n-ph="newPathPh">
      <label><input type="checkbox" id="linkForce"> force</label>
      <button class="primary" data-action="link-selected" data-i18n="linkBtn"></button>
    </div>
  </section>

  <div id="sideCol">
    <aside class="pane" id="projectsPane">
      <h2>Projects</h2>
      <div id="projectCards"></div>
      <div class="rowform">
        <input id="regPath" list="pathOpts" data-i18n-ph="regPathPh">
        <button data-action="register-submit" data-i18n="regBtn"></button>
      </div>
      <div class="rowform">
        <button class="danger" data-action="prune-all" data-i18n="pruneAllBtn"></button>
      </div>
    </aside>
    <section class="pane" id="logPane">
      <h2 data-i18n="logTitle"></h2>
      <div id="log"></div>
    </section>
  </div>
</main>

<datalist id="pathOpts"></datalist>

<dialog id="modal">
  <h3 id="modalTitle"></h3>
  <pre id="modalPre"></pre>
  <menu>
    <button class="safe" data-action="modal-cancel" data-i18n="cancel"></button>
    <button class="primary" data-action="modal-ok" id="modalOkBtn" data-i18n="confirmRun"></button>
  </menu>
</dialog>

<dialog id="extDialog">
  <h3 data-i18n="extTitle"></h3>
  <div class="field"><label data-i18n="extRepoLabel"></label>
    <input id="extRepo" placeholder="owner/repo"></div>
  <div class="field"><label data-i18n="extPathLabel"></label>
    <input id="extPath" placeholder="skills/foo"></div>
  <div class="field"><label data-i18n="extNameLabel"></label>
    <input id="extName"></div>
  <div class="field"><label data-i18n="extRefLabel"></label>
    <input id="extRef"></div>
  <label><input type="checkbox" id="extForce"> <span data-i18n="extForceLabel"></span></label>
  <menu>
    <button class="safe" data-action="ext-cancel" data-i18n="cancel"></button>
    <button class="primary" data-action="ext-submit" data-i18n="extAdd"></button>
  </menu>
</dialog>

<dialog id="drawer">
  <div style="display:flex;align-items:center;gap:8px">
    <h3 id="drawerTitle" style="flex:1;margin:0"></h3>
    <button class="safe" data-action="drawer-close" data-i18n="close"></button>
  </div>
  <div id="drawerBody"></div>
  <pre id="drawerMd"></pre>
</dialog>

<script>

const $ = s => document.querySelector(s);
const token = new URLSearchParams(location.hash.slice(1)).get('t') || '';
let state = null;
let sel = new Set();
const expanded = new Set();   // project card keys the user unfolded; survives re-render
const foldedGroups = new Set(); // skill groups (package/source) the user folded
let busy = false;
let modalFn = null;

/* ---------- i18n ---------- */

const I18N = {

    extRemoveTitle: '移除 External Skill',

    linkBtn: 'Link',

    regPathPh: 'Register a project: /absolute path or ~/… (autocompletes)',

    extRemoveTitle: 'Remove external skill',
    extRemoveText: 'Will remove {name}: the store symlink, its external.json entry and the .gitignore line.\nThe local clone is kept.',

let lang = localStorage.getItem('skillsUiLang') ||
           ((navigator.language || '').startsWith('zh') ? 'zh' : 'en');

function t(key, vars){
  let s = (I18N[lang] && I18N[lang][key]) ?? I18N.zh[key] ?? key;
  if (vars) for (const [k, v] of Object.entries(vars)) s = s.replaceAll('{' + k + '}', v);
  return s;
}

function applyLang(){
  document.documentElement.lang = lang;
  for (const el of document.querySelectorAll('[data-i18n]')) el.textContent = t(el.dataset.i18n);
  for (const el of document.querySelectorAll('[data-i18n-ph]')) el.placeholder = t(el.dataset.i18nPh);
  $('#langBtn').textContent = lang === 'zh' ? 'English' : '中文';
  $('#log').dataset.empty = t('logEmpty');
  if (!$('#drawer').open) $('#drawerMd').textContent = t('loadingMd');
  if (state) render();
}

const esc = s => String(s ?? '').replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const base = p => p.split('/').filter(Boolean).pop() || p;

function banner(msg){ const b = $('#banner'); b.textContent = msg; b.style.display = msg ? 'block' : 'none'; }

async function api(path, opts = {}){
  const headers = {'X-Auth-Token': token, ...(opts.headers || {})};
  if (opts.body) headers['Content-Type'] = 'application/json';
  const r = await fetch(path, {...opts, headers});
  if (!r.ok){
    let msg = 'HTTP ' + r.status;
    try { msg = (await r.json()).error || msg; } catch (e) {}
    throw new Error(msg);
  }
  return r;
}

async function getState(){
  state = await (await api('/api/state')).json();
  render();
}

/* ---------- mutations + log ---------- */

function logStart(label, res){
  const el = document.createElement('div');
  el.className = 'logentry';
  el.innerHTML = `<div class="loghead" data-action="log-toggle">
      <span>${new Date().toLocaleTimeString()}</span>
      <span>${esc(label)}</span>
      <span class="logcmd"></span>
      <span class="badge b-warn logstat">${esc(t('running'))}</span>
    </div><pre class="logbody"></pre>`;
  $('#log').prepend(el);
  while ($('#log').children.length > 50) $('#log').lastChild.remove();
  return el;
}
function logFinish(el, res){
  el.querySelector('.logcmd').textContent = res.cmd.join(' ');
  const st = el.querySelector('.logstat');
  st.textContent = res.exitCode === 0 ? `exit 0 · ${res.durationMs}ms` : `exit ${res.exitCode}`;
  st.className = 'badge logstat ' + (res.exitCode === 0 ? 'b-ok' : 'b-err');
  el.querySelector('.logbody').textContent =
    '$ ' + res.cmd.join(' ') + '\n' + (res.stdout || '') +
    (res.stderr ? '\n[stderr]\n' + res.stderr : '');
}
function logFail(el, msg){
  const st = el.querySelector('.logstat');
  st.textContent = t('failed');
  st.className = 'badge logstat b-err';
  el.querySelector('.logbody').textContent = msg;
}

async function run(label, path, body){
  if (busy){ banner(t('busyMsg')); return null; }
  busy = true;
  document.body.classList.add('busy');   // grey out mutation buttons; .safe ones stay usable
  const el = logStart(label);
  try {
    const res = await (await api(path, {method:'POST', body: JSON.stringify(body || {})})).json();
    logFinish(el, res);
    await getState();
    return res;
  } catch (e) {
    logFail(el, e.message);
    return null;
  } finally { busy = false; document.body.classList.remove('busy'); }
}

function showModal(title, text, fn){
  $('#modalTitle').textContent = title;
  $('#modalPre').textContent = text;
  modalFn = fn;
  $('#modal').showModal();
}

/* dry-run first (via the script's own -n), show its real output, then confirm */
async function confirmViaDryRun(label, path, body){
  const preview = await run(label + t('dryRunTag'), path, {...body, dryRun: true});
  if (!preview) return;
  const out = (preview.stdout || '') + (preview.stderr || '');
  showModal(label, out.trim() || t('dryRunEmpty'),
            () => run(label, path, body));
}

/* ---------- render ---------- */

function render(){
  banner('');
  renderHealth();
  renderPkgFilter();
  renderSkills();
  renderProjects();
}

function renderHealth(){
  const d = state.health.doctor, p = state.health.packagesMd;
  const db = $('#doctorBadge');
  db.textContent = d.exitCode === 0 ? t('doctorOk') : t('doctorBad');
  db.className = 'badge clickable ' + (d.exitCode === 0 ? 'b-ok' : 'b-err');
  $('#healthOut').textContent = (d.stdout || '') + (d.stderr || '');
  const pb = $('#pkgBadge');
  pb.textContent = p.exitCode === 0 ? t('pkgFresh') : t('pkgStale');
  pb.className = 'badge ' + (p.exitCode === 0 ? 'b-ok' : 'b-warn');
  $('#btnGen').classList.toggle('primary', p.exitCode !== 0);
}

function renderPkgFilter(){
  const cur = $('#pkgFilter').value;
  $('#pkgFilter').innerHTML = `<option value="">${esc(t('pkgAll'))}</option>` +
    state.packages.map(p => `<option value="${esc(p.name)}">${esc(p.name)}</option>`).join('');
  $('#pkgFilter').value = cur;
}

function visibleSkills(){
  const q = $('#q').value.trim().toLowerCase();
  const src = $('#srcFilter').value, pkg = $('#pkgFilter').value;
  return state.store.skills.filter(s =>
    (!src || s.source === src) &&
    (!pkg || s.package === pkg) &&
    (!q || s.name.toLowerCase().includes(q) ||
     (s.description || '').toLowerCase().includes(q)));
}

function skillRow(s){
  const orphanFix = s.source === 'orphan'
    ? `<br><button class="mini" data-action="mark-authored" data-name="${esc(s.name)}">${esc(t('markAuthored'))}</button>
       <button class="mini" data-action="ext-open" data-name="${esc(s.name)}">${esc(t('regExternal'))}</button>`
    : '';
  const extWarn = s.external && !s.external.symlinkOk
    ? ` <span class="badge b-err">${esc(t('brokenLink'))}</span>` : '';
  const linked = s.linkedIn.length
    ? `<span title="${esc(s.linkedIn.join('\n'))}">${esc(t('linkedPlaces', {n: s.linkedIn.length}))}</span>` : '—';
  return `<tr>
    <td><input type="checkbox" class="pick" data-name="${esc(s.name)}"
         ${sel.has(s.name) ? 'checked' : ''}></td>
    <td class="name" data-action="open-skill" data-name="${esc(s.name)}">${esc(s.name)}
      <div class="desc">${esc(s.description || '')}</div></td>
    <td><span class="badge b-${s.source}">${s.source}</span>${extWarn}${orphanFix}</td>
    <td>${linked}</td>
  </tr>`;
}

const skillGroup = s => s.package || s.source;
const tailGroups = ['authored', 'external', 'orphan'];  // non-package groups, listed last

function renderSkills(){
  sel = new Set([...sel].filter(n => state.store.skills.some(s => s.name === n)));
  const groups = new Map();
  for (const s of visibleSkills()){
    const k = skillGroup(s);
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(s);
  }
  // a text search must reveal its matches; a filter narrowed to one group may as well show it
  const forceOpen = !!$('#q').value.trim() || groups.size === 1;
  const rank = k => (tailGroups.includes(k) ? '1' + tailGroups.indexOf(k) : '0' + k);
  const html = [...groups.keys()].sort((a, b) => rank(a).localeCompare(rank(b))).map(k => {
    const members = groups.get(k);
    const open = forceOpen || !foldedGroups.has(k);
    const picked = members.filter(s => sel.has(s.name)).length;
    const title = tailGroups.includes(k)
      ? `<span class="badge b-${k}">${k}</span>` : `<b>${esc(k)}</b>`;
    return `<tr class="grouphead">
      <td><input type="checkbox" class="gpick" data-group="${esc(k)}"
           ${picked === members.length ? 'checked' : ''}></td>
      <td colspan="3" class="glabel" tabindex="0" data-action="group-toggle" data-group="${esc(k)}">
        <span class="gcaret">${open ? '▾' : '▸'}</span>${title}
        <span class="gcount">${esc(picked ? t('groupSel', {p: picked, n: members.length})
                                          : t('groupCount', {n: members.length}))}</span></td>
    </tr>` + (open ? members.map(skillRow).join('') : '');
  }).join('');
  $('#skillsBody').innerHTML = html ||
    `<tr><td colspan="4" style="color:var(--dim)">${esc(t('noMatch'))}</td></tr>`;
  for (const cb of document.querySelectorAll('.gpick')){   // indeterminate is a property, not an attribute
    const members = groups.get(cb.dataset.group) || [];
    const picked = members.filter(s => sel.has(s.name)).length;
    cb.indeterminate = picked > 0 && picked < members.length;
  }
  const all = [...groups.values()].flat();
  const pickedAll = all.filter(s => sel.has(s.name)).length;
  const sa = $('#selAll');
  sa.checked = all.length > 0 && pickedAll === all.length;
  sa.indeterminate = pickedAll > 0 && pickedAll < all.length;
  $('#nonSkillLine').textContent = state.store.nonSkillDirs.length
    ? t('ignoredDirs') + state.store.nonSkillDirs.join(t('listSep')) : '';
  renderLinkBar();
}

function renderLinkBar(){
  $('#selLabel').textContent = t('selLabel', {n: sel.size});
  $('#linkBar').classList.toggle('on', sel.size > 0);
  const cur = $('#linkTarget').value;
  $('#linkTarget').innerHTML =
    state.projects.map(p => `<option value="${esc(p.path)}">${esc(base(p.path))} — ${esc(p.path)}</option>`).join('') +
    `<option value="__global__">${esc(t('globalOpt'))}</option>` +
    `<option value="__new__">${esc(t('newPathOpt'))}</option>`;
  if ([...$('#linkTarget').options].some(o => o.value === cur)) $('#linkTarget').value = cur;
  $('#newPath').style.display = $('#linkTarget').value === '__new__' ? 'inline-block' : 'none';
}

function projectCard(p){
  const items = p.links.map(l => `
    <li><span class="lname">${esc(l.name)}</span>
      ${l.ok ? '' : `<span class="badge b-warn">${esc(t('broken'))}</span>`}
      ${l.intoStore ? '' : `<span class="badge b-external" title="${esc(t('foreignTip'))}">${esc(t('foreign'))}</span>`}
      <button class="mini danger" data-action="unlink-one"
        data-proj="${esc(p.path)}" data-name="${esc(l.name)}">✕</button></li>`).join('');
  return `<details class="card" data-key="${esc(p.path)}" ${expanded.has(p.path) ? 'open' : ''}>
    <summary class="cardhead"><span class="pname">${esc(base(p.path))}</span>
      <span class="ppath">${esc(p.path)}</span>
      <span class="lcount">${esc(t('nLinks', {n: p.links.length}))}</span>
      ${p.exists ? '' : `<span class="badge b-err">${esc(t('dirMissing'))}</span>`}</summary>
    <ul class="plinks">${items || `<li style="color:var(--dim)">${esc(t('noLinks'))}</li>`}</ul>
    <div class="cardfoot">
      <button class="mini" data-action="prune-proj" data-proj="${esc(p.path)}">Prune</button>
      <button class="mini danger" data-action="dereg" data-proj="${esc(p.path)}">${esc(t('deregBtn'))}</button>
    </div></details>`;
}

function renderProjects(){
  const g = state.global.links.map(l => `
    <li><span class="lname">${esc(l.name)}</span>
      ${l.ok ? '' : `<span class="badge b-warn">${esc(t('broken'))}</span>`}
      <button class="mini danger" data-action="unlink-one" data-global="1"
        data-name="${esc(l.name)}">✕</button></li>`).join('');
  const globalCard = `<details class="card" data-key="GLOBAL" ${expanded.has('GLOBAL') ? 'open' : ''}>
    <summary class="cardhead"><span class="pname">GLOBAL</span>
      <span class="ppath">${esc(t('globalPath'))}</span>
      <span class="lcount">${esc(t('nLinks', {n: state.global.links.length}))}</span></summary>
    <ul class="plinks">${g || `<li style="color:var(--dim)">${esc(t('noLinks'))}</li>`}</ul>
    <div class="cardfoot">
      <button class="mini" data-action="prune-global">Prune</button>
    </div></details>`;
  $('#projectCards').innerHTML = globalCard + state.projects.map(projectCard).join('') +
    (state.projects.length ? '' :
     `<div class="dimline">${esc(t('noProjects'))}</div>`);
}

/* ---------- drawer ---------- */

async function openDrawer(name){
  const s = state.store.skills.find(x => x.name === name);
  if (!s) return;
  $('#drawerTitle').innerHTML = `${esc(s.name)} <span class="badge b-${s.source}">${s.source}</span>`;
  let kv = '';
  if (s.package) kv += `<b>${esc(t('kvPkg'))}</b><span>${esc(s.package)}</span>`;
  if (s.external){
    kv += `<b>repo</b><span>${esc(s.external.repo)}</span>`;
    if (s.external.ref) kv += `<b>ref</b><span>${esc(s.external.ref)}</span>`;
    kv += `<b>${esc(t('kvPath'))}</b><span>${esc(s.external.skillPath)}</span>`;
    kv += `<b>clone</b><span>${esc(s.external.cloneTarget || t('symlinkMissing'))}
           ${s.external.symlinkOk ? '' : ` <span class="badge b-err">${esc(t('broken'))}</span>`}</span>`;
  }
  const linked = s.linkedIn.map(p => {
    const g = p === 'GLOBAL';
    return `<li><span class="lname">${esc(p)}</span>
      <button class="mini danger" data-action="unlink-one" data-name="${esc(s.name)}"
        ${g ? 'data-global="1"' : `data-proj="${esc(p)}"`}>✕ unlink</button></li>`;
  }).join('');
  const extActions = s.source === 'external'
    ? `<div class="cardfoot"><button class="mini danger" data-action="ext-remove"
         data-name="${esc(s.name)}">${esc(t('extRemoveBtn'))}</button></div>` : '';
  $('#drawerBody').innerHTML = `<div class="kv">${kv}</div>
    <div><b style="font-size:12px;color:var(--dim)">${esc(t('linkedInTitle'))}</b>
      <ul class="plinks">${linked || `<li style="color:var(--dim)">${esc(t('notLinked'))}</li>`}</ul></div>
    ${extActions}`;
  $('#drawerMd').textContent = t('loadingMd');
  $('#drawer').showModal();
  try {
    $('#drawerMd').textContent = await (await api(`/api/skill/${name}/skillmd`)).text();
  } catch (e) {
    $('#drawerMd').textContent = t('readFail') + e.message;
  }
}

/* ---------- path autocomplete ---------- */

function attachComplete(input){
  let timer = null;   // per-input, so the two path fields don't cancel each other
  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(async () => {
      try {
        const r = await (await api('/api/complete-path?prefix=' +
                                   encodeURIComponent(input.value))).json();
        $('#pathOpts').innerHTML =
          r.dirs.map(d => `<option value="${esc(d)}"></option>`).join('');
      } catch (e) {}
    }, 200);
  });
}

/* ---------- actions ---------- */

function unlinkBody(ds, name){
  return ds.global ? {global: true, items: [name]} : {target: ds.proj, items: [name]};
}

const actions = {
  'refresh': () => getState().catch(e => banner(t('refreshFail') + e.message)),
  'doctor': () => run('doctor', '/api/doctor'),
  'gen': () => run('gen-packages', '/api/gen-packages'),
  'sync': () => run('sync-external', '/api/external/sync', {}),
  'lang-toggle': () => {
    lang = lang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('skillsUiLang', lang);
    applyLang();
  },
  'health-toggle': () => {
    const h = $('#healthOut');
    h.style.display = h.style.display === 'block' ? 'none' : 'block';
  },
  'log-toggle': el => {
    const b = el.closest('.logentry').querySelector('.logbody');
    b.style.display = b.style.display === 'block' ? 'none' : 'block';
  },
  'group-toggle': el => {
    const k = el.dataset.group;
    foldedGroups.has(k) ? foldedGroups.delete(k) : foldedGroups.add(k);
    renderSkills();
  },
  'open-skill': el => openDrawer(el.dataset.name),
  'drawer-close': () => $('#drawer').close(),
  'mark-authored': el => run('mark-authored ' + el.dataset.name,
                             '/api/mark-authored', {names: [el.dataset.name]}),
  'link-selected': () => {
    const items = [...sel];
    if (!items.length) return;
    const t2 = $('#linkTarget').value;
    const body = {items, force: $('#linkForce').checked};
    if (t2 === '__global__') body.global = true;
    else if (t2 === '__new__'){
      body.target = $('#newPath').value.trim();
      if (!body.target) return alert(t('needTargetPath'));
    } else body.target = t2;
    run('link → ' + (body.global ? 'GLOBAL' : base(body.target)), '/api/link', body)
      .then(res => { if (res && res.exitCode === 0){ sel.clear(); renderSkills(); } });
  },
  'unlink-one': el => {
    $('#drawer').close();
    const name = el.dataset.name;
    confirmViaDryRun(`unlink ${name} ← ${el.dataset.global ? 'GLOBAL' : base(el.dataset.proj)}`,
                     '/api/unlink', unlinkBody(el.dataset, name));
  },
  'prune-proj': el => confirmViaDryRun('prune ' + base(el.dataset.proj),
                                       '/api/prune', {target: el.dataset.proj}),
  'prune-global': () => confirmViaDryRun('prune GLOBAL', '/api/prune', {global: true}),
  'prune-all': () => confirmViaDryRun(t('pruneAllLabel'), '/api/prune-all', {}),
  'dereg': el => showModal(t('deregTitle'),
      t('deregText', {p: el.dataset.proj}),
      () => run('deregister ' + base(el.dataset.proj), '/api/register',
                {paths: [el.dataset.proj], remove: true})),
  'register-submit': () => {
    const p = $('#regPath').value.trim();
    if (!p) return alert(t('needProjPath'));
    run('register ' + base(p), '/api/register', {paths: [p]})
      .then(res => { if (res && res.exitCode === 0) $('#regPath').value = ''; });
  },
  'ext-open': el => {
    for (const id of ['extRepo', 'extPath', 'extName', 'extRef']) $('#' + id).value = '';
    $('#extForce').checked = false;
    if (el.dataset.name) $('#extName').value = el.dataset.name;
    $('#extDialog').showModal();
  },
  'ext-cancel': () => $('#extDialog').close(),
  'ext-submit': () => {
    const body = {
      repo: $('#extRepo').value.trim(),
      skillPath: $('#extPath').value.trim(),
      force: $('#extForce').checked,
    };
    if ($('#extName').value.trim()) body.name = $('#extName').value.trim();
    if ($('#extRef').value.trim()) body.ref = $('#extRef').value.trim();
    if (!body.repo || !body.skillPath) return alert(t('needRepoPath'));
    $('#extDialog').close();
    run('add-external ' + (body.name || body.skillPath), '/api/external/add', body);
  },
  'ext-remove': el => {
    $('#drawer').close();
    showModal(t('extRemoveTitle'),
      t('extRemoveText', {name: el.dataset.name}),
      () => run('remove-external ' + el.dataset.name,
                '/api/external/remove', {names: [el.dataset.name]}));
  },
  'modal-cancel': () => { modalFn = null; $('#modal').close(); },
  'modal-ok': () => { const f = modalFn; modalFn = null; $('#modal').close(); if (f) f(); },
};

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (el && actions[el.dataset.action]) actions[el.dataset.action](el);
});

// toggle doesn't bubble — capture it to remember which cards the user unfolded
document.addEventListener('toggle', e => {
  const d = e.target;
  if (d.tagName === 'DETAILS' && d.dataset.key)
    d.open ? expanded.add(d.dataset.key) : expanded.delete(d.dataset.key);
}, true);

// keyboard access for the group headers (plain td, unlike the projects' native <details>)
document.addEventListener('keydown', e => {
  const el = e.target;
  if ((e.key === 'Enter' || e.key === ' ') && el.matches?.('td.glabel')){
    e.preventDefault();
    actions['group-toggle'](el);
    document.querySelector(`td.glabel[data-group="${CSS.escape(el.dataset.group)}"]`)?.focus();
  }
});

document.addEventListener('change', e => {
  if (e.target.classList.contains('pick')){
    e.target.checked ? sel.add(e.target.dataset.name) : sel.delete(e.target.dataset.name);
    renderSkills();   // keep the group checkbox in sync
  } else if (e.target.classList.contains('gpick')){
    visibleSkills().filter(s => skillGroup(s) === e.target.dataset.group)
      .forEach(s => e.target.checked ? sel.add(s.name) : sel.delete(s.name));
    renderSkills();
  } else if (e.target.id === 'selAll'){
    visibleSkills().forEach(s => e.target.checked ? sel.add(s.name) : sel.delete(s.name));
    renderSkills();
  } else if (e.target.id === 'linkTarget'){
    $('#newPath').style.display = e.target.value === '__new__' ? 'inline-block' : 'none';
  } else if (e.target.id === 'srcFilter' || e.target.id === 'pkgFilter'){
    renderSkills();
  }
});
$('#q').addEventListener('input', renderSkills);
attachComplete($('#newPath'));
attachComplete($('#regPath'));

/* ---------- boot ---------- */

applyLang();
if (!token){
  banner(t('noToken'));
} else {
  getState().catch(e => banner(t('loadFail') + e.message));
  // pick up changes made from the CLI while the window was in the background
  window.addEventListener('focus', () => { if (!busy) getState().catch(() => {}); });
}
</script>
</body>
</html>
